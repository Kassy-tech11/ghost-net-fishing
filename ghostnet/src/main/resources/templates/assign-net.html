<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bergung übernehmen</title>
</head>
<body>

<h1>Bergung übernehmen</h1>

<p>
    Geisternetz-ID:
    <span th:text="${ghostNet.id}"></span>
</p>

<p>
    Standort:
    <span th:text="${ghostNet.latitude}"></span>,
    <span th:text="${ghostNet.longitude}"></span>
</p>

<p>
    Geschätzte Größe:
    <span th:text="${ghostNet.estimatedSize}"></span>
</p>

<form th:action="@{/assign-net/{id}(id=${ghostNet.id})}" th:object="${rescuer}" method="post">

    <label>Name der bergenden Person:</label><br>
    <input type="text" th:field="*{name}" required><br><br>

    <label>Telefonnummer:</label><br>
    <input type="text" th:field="*{phoneNumber}" required><br><br>

    <button type="submit">Bergung übernehmen</button>

</form>

<br>

<a th:href="@{/open-nets}">Zurück zu offenen Netzen</a>

</body>
</html>
